<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ name }} log — clidestable</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #e0e0e0; font-family: 'SF Mono', monospace; padding: 16px; }
        .header { margin-bottom: 16px; display: flex; align-items: center; gap: 12px; font-size: 0.85em; }
        .header a { color: #36f9f6; text-decoration: none; }
        .name { color: #72f1b8; font-weight: 600; }
        pre {
            background: #16213e; border: 1px solid #333; border-radius: 6px; padding: 16px;
            font-size: 0.82em; line-height: 1.6; overflow-x: auto; white-space: pre-wrap;
            word-break: break-word; max-height: calc(100vh - 80px); overflow-y: auto;
        }
        .ts { color: #888; }
        .cmd { color: #fede5d; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/">&larr; stalls</a>
        <span class="name">{{ name }}</span>
        <span style="color:#888;">activity log</span>
        <button onclick="refresh()" style="padding:4px 10px;background:#1a1a2e;border:1px solid #444;border-radius:4px;color:#e0e0e0;cursor:pointer;font-family:inherit;font-size:0.85em;">Refresh</button>
    </div>
    <pre id="log">{{ log }}</pre>
    <script>
    const logEl = document.getElementById('log');
    logEl.scrollTop = logEl.scrollHeight;
    async function refresh() {
        const resp = await fetch('/api/stalls/{{ name }}/log?lines=500');
        const data = await resp.json();
        logEl.textContent = data.log;
        logEl.scrollTop = logEl.scrollHeight;
    }
    setInterval(refresh, 3000);
    </script>
</body>
</html>
